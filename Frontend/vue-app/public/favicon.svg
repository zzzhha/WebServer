<svg width="200" height="100" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景矩形 -->
  <rect width="100%" height="100%" fill="#1E1E1E" rx="8" ry="8"/>
  
  <!-- C++ 文字主体 -->
  <text x="50%" y="55%" font-family="Consolas, 'Courier New', monospace" 
        font-size="60" font-weight="bold" text-anchor="middle" fill="#007ACC">C++</text>
  
  <!-- 装饰性高光 -->
  <path d="M30 20 L40 15 L170 15 L160 20 Z" fill="none" stroke="#4FC3F7" stroke-width="1" opacity="0.5"/>
  
  <!-- 底部装饰线 -->
  <line x1="40" y1="80" x2="160" y2="80" stroke="#007ACC" stroke-width="2" opacity="0.7"/>
</svg>

