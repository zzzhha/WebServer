  schemas:
    Folder:
      type: string
      enum: [images, video, uploads]

    SuccessResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 操作成功

    ErrorDetails:
      type: object
      required: [http_status]
      properties:
        http_status:
          type: integer
          example: 400

    ErrorInner:
      type: object
      required: [code, message, details, timestamp]
      properties:
        code:
          type: string
          example: HTTP_400
        message:
          type: string
          example: 非法参数
        details:
          $ref: '#/components/schemas/ErrorDetails'
        timestamp:
          type: string
          format: date-time
          example: 2026-03-04T00:00:00Z

    ErrorResponse:
      type: object
      required: [success, code, message, timestamp, details, error]
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: HTTP_400
        message:
          type: string
          example: 非法参数
        timestamp:
          type: string
          format: date-time
          example: 2026-03-04T00:00:00Z
        details:
          $ref: '#/components/schemas/ErrorDetails'
        error:
          $ref: '#/components/schemas/ErrorInner'

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: 3-20 位，字母开头，仅字母数字下划线
          minLength: 3
          maxLength: 20
          example: alice_01
        password:
          type: string
          description: 至少 6 位
          minLength: 6
          example: "123456"

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          example: alice_01
        password:
          type: string
          minLength: 1
          example: "123456"

    LoginData:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT Token

    LoginResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 登录成功
        data:
          $ref: '#/components/schemas/LoginData'

    FileItem:
      type: object
      required: [folder, name, size, mimeType, updatedAt, url, downloadUrl]
      properties:
        folder:
          $ref: '#/components/schemas/Folder'
        name:
          type: string
          example: sample.jpg
        size:
          type: integer
          format: int64
          example: 12345
        mimeType:
          type: string
          example: image/jpeg
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-04T00:00:00Z
        url:
          type: string
          example: /images/sample.jpg
        downloadUrl:
          type: string
          example: /download/images/sample.jpg

    FileListData:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileItem'

    FileListResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 操作成功
        data:
          $ref: '#/components/schemas/FileListData'

    FilePreviewData:
      allOf:
        - $ref: '#/components/schemas/FileItem'
        - type: object
          required: [supportRange]
          properties:
            supportRange:
              type: boolean
              example: true

    FilePreviewResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 操作成功
        data:
          $ref: '#/components/schemas/FilePreviewData'

    UploadInitRequest:
      type: object
      required: [fileName, fileSize]
      properties:
        fileName:
          type: string
          description: 文件名（禁止 / \\ .. \0，且需符合 folder 对应的扩展名白名单）
          example: big.mp4
        folder:
          $ref: '#/components/schemas/Folder'
        fileSize:
          type: integer
          format: int64
          description: 文件大小（bytes），上限 200MB
          example: 10485760
        chunkSize:
          type: integer
          format: int32
          description: 分片大小（bytes），上限 8MB；非法时回落 1MB
          example: 1048576
        uploadId:
          type: string
          description: 续传时传回之前的 uploadId
          example: 1772607242572-327b23c6

    UploadInitData:
      type: object
      required: [uploadId, chunkSize, uploadedParts]
      properties:
        uploadId:
          type: string
        chunkSize:
          type: integer
          format: int32
        uploadedParts:
          type: array
          items:
            type: integer
            minimum: 0

    UploadInitResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 操作成功
        data:
          $ref: '#/components/schemas/UploadInitData'

    UploadPartData:
      type: object
      required: [partNo, size]
      properties:
        partNo:
          type: integer
          minimum: 0
          example: 0
        size:
          type: integer
          format: int64
          example: 1048576

    UploadPartResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 操作成功
        data:
          $ref: '#/components/schemas/UploadPartData'

    UploadCompleteData:
      type: object
      required: [folder, name, url, downloadUrl]
      properties:
        folder:
          $ref: '#/components/schemas/Folder'
        name:
          type: string
          example: big.mp4
        url:
          type: string
          example: /video/big.mp4
        downloadUrl:
          type: string
          example: /download/video/big.mp4

    UploadCompleteResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 操作成功
        data:
          $ref: '#/components/schemas/UploadCompleteData'
